:root{--bg1:#eef2ff;--bg2:#f8fafc;--panel:rgba(255,255,255,.94);--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--dark:#0f172a;--shadow:0 20px 45px rgba(15,23,42,.10);--radius:24px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 45%,#ecfeff 100%)}.wrap{max-width:1320px;margin:0 auto;padding:24px 20px 44px}
.hero{background:linear-gradient(135deg,#0f172a 0%,#1d4ed8 60%,#0ea5e9 100%);color:white;border-radius:32px;padding:28px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}h1{margin:0;font-size:34px;letter-spacing:-.03em}.sub{margin-top:8px;color:rgba(255,255,255,.84);font-size:15px}.logo{width:120px;height:120px;border-radius:22px;background:white;padding:10px;object-fit:contain;box-shadow:0 14px 35px rgba(15,23,42,.18)}
.logoCenter{display:flex;justify-content:center;margin:22px 0 18px}.logoCenter img{max-width:260px;width:45%;min-width:170px;height:auto;border-radius:18px;background:white;padding:10px;box-shadow:0 14px 35px rgba(15,23,42,.10)}
.cta{margin-top:18px;background:white;border:2px solid #1d4ed8;border-radius:26px;padding:18px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:14px}.cta h2{margin:0;font-size:26px;letter-spacing:-.025em}.cta .nums{display:flex;gap:10px;flex-wrap:wrap}.cta .num{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px 14px;min-width:90px}.num b{display:block;font-size:24px}.num span{font-size:12px;color:var(--muted)}
.grid{margin-top:18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}.card{background:var(--panel);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;gap:13px;min-width:0}.tag{display:inline-block;align-self:flex-start;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;color:#1e3a8a;background:#dbeafe}.card h2{margin:0;font-size:21px;letter-spacing:-.02em}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px}.stat b{display:block;font-size:25px}.stat span{font-size:12px;color:var(--muted)}.actions{margin-top:auto}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:11px 15px;border-radius:14px;text-decoration:none;font-weight:800;transition:.15s ease;background:var(--dark);color:white;box-shadow:0 10px 25px rgba(15,23,42,.18)}.btn:hover{transform:translateY(-1px)}.btn.big{font-size:18px;padding:14px 18px;background:#1d4ed8}.footer{margin-top:20px;color:var(--muted);font-size:13px}
@media(max-width:980px){.grid{grid-template-columns:1fr}.hero{grid-template-columns:1fr}.logo{display:none}.cta{display:block}.cta .nums{margin:12px 0}}@media(max-width:720px){.logoCenter img{width:70%}}
</style>
