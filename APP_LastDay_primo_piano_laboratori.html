<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard layout evento - Primo piano laboratori</title>
<style>
:root{--bg:#eef2f7;--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--dark:#0f172a;--shadow:0 18px 50px rgba(15,23,42,.12);--r:18px}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#eef2ff,#f8fafc 45%,#ecfeff);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} button,input,select,textarea{font:inherit} button{border:0;border-radius:13px;padding:10px 12px;background:var(--dark);color:white;cursor:pointer;box-shadow:0 8px 18px rgba(15,23,42,.15)}button:hover{transform:translateY(-1px)}button.secondary{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none}button.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;box-shadow:none}button.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;box-shadow:none}.app{display:grid;grid-template-columns:280px minmax(0,1fr) 330px;min-height:100vh}.left,.right{background:rgba(255,255,255,.86);backdrop-filter:blur(14px);border-color:rgba(226,232,240,.9);padding:16px;overflow:auto}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}main{min-width:0;display:flex;flex-direction:column}header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 18px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}h1{font-size:22px;margin:0;letter-spacing:-.035em}.sub{font-size:13px;color:var(--muted);margin-top:3px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;padding:14px 18px}.kpi{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:0 8px 24px rgba(15,23,42,.06)}.kpi b{font-size:21px;display:block}.kpi span{font-size:12px;color:var(--muted)}.sectionTitle{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin:16px 0 8px}.stack{display:grid;gap:8px}.hint{font-size:12px;line-height:1.4;color:#475569;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:10px}.boardShell{padding:0 18px 18px;overflow:auto;flex:1}.boardScroller{width:100%;height:calc(100vh - 208px);overflow:auto;border:1px solid rgba(203,213,225,.9);border-radius:22px;background:#f8fafc;box-shadow:var(--shadow);position:relative}.stage{position:relative;background:white;overflow:hidden;transform-origin:top left}.content{position:absolute;left:0;top:0;width:1521px;height:570px;transform-origin:top left}.plan{position:absolute;inset:0;width:1521px;height:570px;object-fit:contain;user-select:none;pointer-events:none}.overlay{position:absolute;inset:0;pointer-events:none}.item{position:absolute;border-radius:14px;border:2px solid rgba(15,23,42,.08);box-shadow:0 15px 30px rgba(15,23,42,.2);color:white;overflow:hidden;touch-action:none;cursor:grab;min-width:70px;min-height:48px}.item:active{cursor:grabbing}.item.selected{outline:4px solid rgba(37,99,235,.35)}.item.flowPick{outline:4px solid rgba(245,158,11,.55)}.itemInner{height:100%;padding:10px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(0,0,0,.15))}.item .top{display:flex;gap:6px;align-items:center;justify-content:space-between}.item .kind{font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:3px 7px}.item .name{font-weight:900;line-height:1.05;font-size:15px;text-shadow:0 1px 2px rgba(0,0,0,.35)}.item .zone{font-size:12px;opacity:.95}.item .cap{font-size:12px;font-weight:800}.resize{position:absolute;right:0;bottom:0;width:18px;height:18px;background:rgba(255,255,255,.75);border-radius:12px 0 10px 0;cursor:nwse-resize}.sat{height:5px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;margin-top:5px}.sat i{display:block;height:100%;width:0%;background:#22c55e}.sat.mid i{background:#f59e0b}.sat.high i{background:#ef4444}.flowLine{stroke-width:7;fill:none;filter:drop-shadow(0 2px 2px rgba(15,23,42,.22))}.flowLabel{font-size:24px;font-weight:800;paint-order:stroke;stroke:white;stroke-width:5;stroke-linejoin:round}.empty{padding:20px;text-align:center;color:var(--muted)}.list{display:grid;gap:7px}.list button{width:100%;text-align:left;padding:10px;border-radius:12px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:6px 9px;border:1px solid var(--line);font-size:12px;background:white;color:#334155}label{display:block;font-size:12px;font-weight:800;color:#475569;margin:10px 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:white;color:var(--ink)}textarea{min-height:82px;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rowBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.rowBtns button{flex:1}.flowBox{border:1px solid var(--line);border-radius:14px;background:#f8fafc;padding:10px;margin-top:8px}.modeOn{background:#f59e0b!important;color:#111827!important}.fileInput{font-size:12px}.present .left,.present .right,.present header,.present .kpis{display:none}.present .app{display:block}.present .boardShell{padding:0}.present .boardScroller{height:100vh;border-radius:0;border:0}.badgeSave{font-size:12px;color:#64748b;white-space:nowrap}.toast{position:fixed;right:18px;bottom:18px;background:#0f172a;color:white;padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.2s;z-index:500}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:1100px){.app{grid-template-columns:1fr}.left,.right{border:0;border-bottom:1px solid var(--line);max-height:none}.right{order:3}.left{order:2}main{order:1}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.boardScroller{height:65vh}.toolbar button{flex:1}.left .stack{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){h1{font-size:18px}.kpis{grid-template-columns:1fr 1fr;padding:10px}.boardShell{padding:0 10px 12px}.boardScroller{height:60vh;border-radius:16px}.left,.right{padding:12px}.left .stack{grid-template-columns:1fr}button{min-height:42px}.item .name{font-size:12px}.item .zone,.item .cap{font-size:10px}}
</style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="sectionTitle">Azioni</div>
    <div class="stack">
      <button onclick="location.href='index.html'" class="secondary">← Torna a index</button>
      <button onclick="addItem('Attività')">+ Aggiungi attività</button>
      <button onclick="addItem('Personale ATA')">+ Aggiungi Personale ATA</button>
      <button onclick="addItem('Punto info')" class="secondary">+ Punto info</button>
      <button id="flowBtn" onclick="toggleFlowMode()" class="secondary">↗ Modalità flusso</button>
      <button onclick="fitToScreen()" class="secondary">Adatta schermo</button>
      <button onclick="zoomBy(-.1)" class="secondary">Zoom −</button>
      <button onclick="zoomBy(.1)" class="secondary">Zoom +</button>
    </div>
    <div class="sectionTitle">Planimetria</div>
    <input class="fileInput" type="file" accept="image/*" id="bgInput" />
    
    <div class="sectionTitle">Dati</div>
    <div class="stack">
      <button onclick="saveData()" class="secondary">Salva nel browser</button>
      <button onclick="exportJson()" class="secondary">Esporta JSON</button>
      <button onclick="document.getElementById('jsonInput').click()" class="secondary">Importa JSON</button>
      <input id="jsonInput" type="file" accept="application/json" hidden />
      <button onclick="resetData()" class="danger">Reset iniziale</button>
      <button onclick="togglePresent()" class="warn">Vista presentazione</button>
    </div>
    <div class="sectionTitle">Elementi</div>
    <div id="itemList" class="list"></div>
  </aside>

  <main>
    <header>
      <div class="title">
        <div><h1>Dashboard layout evento scuola</h1><div class="sub">Primo piano laboratori chimica e biologia</div></div>
        <div class="badgeSave" id="saveStatus">Pronto</div>
      </div>
      <div class="toolbar">
        <span class="pill">Piano: <b>Primo piano laboratori</b></span>
        <span class="pill">Zoom: <b id="zoomText">100%</b></span>
        <span class="pill" id="modeText">Modalità: modifica</span>
      </div>
    </header>
    <section class="kpis">
      <div class="kpi"><b id="kAct">0</b><span>attività</span></div>
      <div class="kpi"><b id="kCap">0</b><span>capienza totale</span></div>
      <div class="kpi"><b id="kCnt">0</b><span>persone previste</span></div>
      <div class="kpi"><b id="kSat">0%</b><span>saturazione media</span></div>
      <div class="kpi"><b id="kAta">0</b><span>postazioni ATA</span></div>
    </section>
    <section class="boardShell">
      <div id="boardScroller" class="boardScroller">
        <div id="stage" class="stage">
          <div id="content" class="content">
            <img id="plan" class="plan" alt="Planimetria primo piano laboratori" />
            <svg id="flows" class="overlay" viewBox="0 0 1521 570" preserveAspectRatio="none">
              <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker></defs>
            </svg>
            <div id="itemsLayer"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="right">
    <div class="sectionTitle">Modifica selezione</div>
    <div id="editor" class="empty">Nessuna selezione.</div>
  </aside>
</div>
<div id="toast" class="toast"></div>

 18, "responsible": "", "notes": "Laboratorio microbiologia", "color": "#16a34a", "x": 1200, "y": 270, "w": 85, "h": 96}, {"id": "ata1", "type": "Personale ATA", "title": "Controllo corridoio", "zone": "Corridoio centrale primo piano laboratori", "capacity": 0, "count": 1, "responsible": "Personale ATA", "notes": "Presidio e orientamento flusso studenti", "color": "#334155", "x": 720, "y": 218, "w": 180, "h": 64}, {"id": "info1", "type": "Punto info", "title": "Punto info", "zone": "Corridoio / scala centrale", "capacity": 0, "count": 1, "responsible": "Staff", "notes": "QR, orientamento e indicazioni", "color": "#0891b2", "x": 896, "y": 220, "w": 155, "h": 62}], "flows": [{"id": "f1", "from": "info1", "to": "l78", "title": "Ingresso gruppo chimica", "students": 20, "color": "#f59e0b", "notes": "Flusso indicativo"}, {"id": "f2", "from": "l78", "to": "l76", "title": "Rotazione laboratori", "students": 20, "color": "#06b6d4", "notes": "Flusso indicativo"}, {"id": "f3", "from": "l76", "to": "l73", "title": "Rotazione avanzata", "students": 18, "color": "#a855f7", "notes": "Flusso indicativo"}]}</script>
<script>
const BASE_W = 1521, BASE_H = 570;
const STORAGE = 'layout_evento_laboratori_primo_piano_chimica_biologia_v1';
const originalData = JSON.parse(document.getElementById('initial-data').textContent);
let data = loadData();
let zoom = .62;
let selected = null;
let flowMode = false;
let flowStart = null;
let drag = null;
const $ = id => document.getElementById(id);
function clone(o){return JSON.parse(JSON.stringify(o));}
function loadData(){try{const s=localStorage.getItem(STORAGE); if(s) return JSON.parse(s)}catch(e){} return clone(originalData)}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),1800)}
function markDirty(){ $('saveStatus').textContent='Modifiche non salvate'; }
function saveData(){localStorage.setItem(STORAGE,JSON.stringify(data));$('saveStatus').textContent='Salvato nel browser';toast('Salvato')}
function resetData(){ if(confirm('Ripristinare la versione iniziale?')){localStorage.removeItem(STORAGE);data=clone(originalData);selected=null;flowStart=null;render();toast('Ripristinato')} }
function setZoom(z){zoom=Math.max(.28,Math.min(1.8,z));$('stage').style.width=(BASE_W*zoom)+'px';$('stage').style.height=(BASE_H*zoom)+'px';$('content').style.transform='scale('+zoom+')';$('zoomText').textContent=Math.round(zoom*100)+'%'}
function zoomBy(d){setZoom(zoom+d)}
function fitToScreen(){const box=$('boardScroller').clientWidth-24;setZoom(box/BASE_W);$('boardScroller').scrollLeft=0;$('boardScroller').scrollTop=0}
function centerPoint(){const sc=$('boardScroller');return {x:(sc.scrollLeft+sc.clientWidth/2)/zoom,y:(sc.scrollTop+sc.clientHeight/2)/zoom}}
function addItem(type){const c=centerPoint();const id='i'+Date.now();const palette={"Attività":"#2563eb","Personale ATA":"#334155","Punto info":"#0891b2","Area attesa":"#f59e0b","Emergenza":"#dc2626"};data.items.push({id,type,title:type==='Attività'?'Nuova attività':type,zone:'Zona da definire',capacity:type==='Attività'?25:0,count:type==='Attività'?0:1,responsible:'',notes:'',color:palette[type]||'#2563eb',x:Math.max(20,c.x-90),y:Math.max(20,c.y-45),w:180,h:90});selected={kind:'item',id};markDirty();render();}
function itemById(id){return data.items.find(i=>i.id===id)}
function flowById(id){return data.flows.find(f=>f.id===id)}
function satClass(i){if(!i.capacity) return ''; const p=i.count/i.capacity; return p>.95?'high':p>=.7?'mid':''}
function saturation(i){return i.capacity?Math.round((i.count/i.capacity)*100):0}
function render(){
  $('plan').src=data.background;
  renderItems();renderFlows();renderEditor();renderList();renderKpis();setZoom(zoom);
}
function renderItems(){
 const layer=$('itemsLayer'); layer.innerHTML='';
 data.items.forEach(i=>{
  const el=document.createElement('div'); el.className='item '+((selected&&selected.kind==='item'&&selected.id===i.id)?'selected ':'')+((flowStart===i.id)?'flowPick':''); el.style.left=i.x+'px';el.style.top=i.y+'px';el.style.width=i.w+'px';el.style.height=i.h+'px';el.style.background=i.color; el.dataset.id=i.id;
  const pct=Math.min(140,saturation(i)); const isAta=i.type==='Personale ATA';
  el.innerHTML=`<div class="itemInner"><div><div class="top"><span class="kind">${escapeHtml(isAta?'ATA':i.type)}</span><span class="cap">${i.capacity?escapeHtml(i.count+'/'+i.capacity):escapeHtml(i.count||'')}</span></div><div class="name">${escapeHtml(i.title)}</div><div class="zone">${escapeHtml(i.zone)}</div></div>${i.capacity?`<div class="sat ${satClass(i)}"><i style="width:${pct}%"></i></div>`:''}</div><div class="resize" data-resize="1"></div>`;
  el.addEventListener('pointerdown', onItemDown); el.addEventListener('click', onItemClick); layer.appendChild(el);
 })
}
function renderFlows(){
 const svg=$('flows'); [...svg.querySelectorAll('.dyn')].forEach(n=>n.remove());
 data.flows.forEach(f=>{const a=itemById(f.from), b=itemById(f.to); if(!a||!b) return; const ax=a.x+a.w/2, ay=a.y+a.h/2, bx=b.x+b.w/2, by=b.y+b.h/2; const mx=(ax+bx)/2, my=(ay+by)/2-12; const path=document.createElementNS('http://www.w3.org/2000/svg','path'); path.setAttribute('class','dyn flowLine'); path.setAttribute('d',`M ${ax} ${ay} C ${mx} ${my-60}, ${mx} ${my+60}, ${bx} ${by}`); path.setAttribute('stroke',f.color||'#f59e0b'); path.setAttribute('marker-end','url(#arrow)'); path.style.pointerEvents='stroke'; path.dataset.id=f.id; path.addEventListener('click',e=>{e.stopPropagation();selected={kind:'flow',id:f.id};render()}); svg.appendChild(path); const tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('class','dyn flowLabel'); tx.setAttribute('x',mx); tx.setAttribute('y',my); tx.setAttribute('text-anchor','middle'); tx.setAttribute('fill',f.color||'#f59e0b'); tx.textContent=(f.students?f.students+' · ':'')+(f.title||'flusso'); tx.style.pointerEvents='none'; svg.appendChild(tx); })
}
function renderList(){const list=$('itemList'); list.innerHTML=''; data.items.forEach(i=>{const b=document.createElement('button'); b.className='secondary'; b.innerHTML=`<b>${escapeHtml(i.title)}</b><br><small>${escapeHtml(i.type)} · ${escapeHtml(i.zone)}</small>`; b.onclick=()=>{selected={kind:'item',id:i.id};scrollToItem(i);render()}; list.appendChild(b)})}
function renderKpis(){const acts=data.items.filter(i=>i.type==='Attività'); const cap=acts.reduce((a,i)=>a+(+i.capacity||0),0); const cnt=acts.reduce((a,i)=>a+(+i.count||0),0); $('kAct').textContent=acts.length; $('kCap').textContent=cap; $('kCnt').textContent=cnt; $('kSat').textContent=cap?Math.round(cnt/cap*100)+'%':'0%'; $('kAta').textContent=data.items.filter(i=>i.type==='Personale ATA').length;}
function renderEditor(){const ed=$('editor'); if(!selected){ed.className='empty';ed.textContent='Nessuna selezione.';return} ed.className=''; if(selected.kind==='item'){const i=itemById(selected.id); if(!i){selected=null;renderEditor();return} ed.innerHTML=`<label>Titolo</label><input data-f="title" value="${escapeAttr(i.title)}"><label>Tipo</label><select data-f="type">${['Attività','Personale ATA','Punto info','Area attesa','Emergenza'].map(t=>`<option ${i.type===t?'selected':''}>${t}</option>`).join('')}</select><label>Aula / zona</label><input data-f="zone" value="${escapeAttr(i.zone)}"><div class="grid2"><div><label>Capienza</label><input type="number" data-f="capacity" value="${i.capacity||0}"></div><div><label>Previsti</label><input type="number" data-f="count" value="${i.count||0}"></div></div><label>Responsabile / ruolo</label><input data-f="responsible" value="${escapeAttr(i.responsible||'')}"><label>Colore</label><input type="color" data-f="color" value="${escapeAttr(i.color||'#2563eb')}"><label>Note</label><textarea data-f="notes">${escapeHtml(i.notes||'')}</textarea><div class="grid2"><div><label>X</label><input type="number" data-f="x" value="${Math.round(i.x)}"></div><div><label>Y</label><input type="number" data-f="y" value="${Math.round(i.y)}"></div><div><label>Larghezza</label><input type="number" data-f="w" value="${Math.round(i.w)}"></div><div><label>Altezza</label><input type="number" data-f="h" value="${Math.round(i.h)}"></div></div><div class="rowBtns"><button onclick="duplicateSelected()" class="secondary">Duplica</button><button onclick="deleteSelected()" class="danger">Elimina</button></div>`;} else {const f=flowById(selected.id); if(!f){selected=null;renderEditor();return} ed.innerHTML=`<div class="flowBox"><b>Flusso</b><br><small>${escapeHtml(itemById(f.from)?.title||'?')} → ${escapeHtml(itemById(f.to)?.title||'?')}</small></div><label>Nome flusso</label><input data-flow="title" value="${escapeAttr(f.title||'')}"><label>Studenti stimati</label><input type="number" data-flow="students" value="${f.students||0}"><label>Colore</label><input type="color" data-flow="color" value="${escapeAttr(f.color||'#f59e0b')}"><label>Note</label><textarea data-flow="notes">${escapeHtml(f.notes||'')}</textarea><div class="rowBtns"><button onclick="deleteSelected()" class="danger">Elimina flusso</button></div>`}
}
document.addEventListener('input',e=>{
 if(!selected)return;
 if(e.target.dataset.f){
  const i=itemById(selected.id); if(!i)return;
  const f=e.target.dataset.f;
  i[f]=['capacity','count','x','y','w','h'].includes(f)?Number(e.target.value):e.target.value;
  markDirty();
  renderItems();renderFlows();renderList();renderKpis();setZoom(zoom);
 }
 if(e.target.dataset.flow){
  const f=flowById(selected.id); if(!f)return;
  const k=e.target.dataset.flow;
  f[k]=k==='students'?Number(e.target.value):e.target.value;
  markDirty();
  renderFlows();renderList();renderKpis();setZoom(zoom);
 }
})
function onItemClick(e){e.stopPropagation(); const id=e.currentTarget.dataset.id; if(flowMode){ if(!flowStart){flowStart=id; selected={kind:'item',id}; toast('Scegli la destinazione del flusso'); render(); return} if(flowStart!==id){data.flows.push({id:'f'+Date.now(),from:flowStart,to:id,title:'Nuovo flusso',students:0,color:'#f59e0b',notes:''}); flowStart=null; flowMode=false; selected={kind:'flow',id:data.flows.at(-1).id}; markDirty();toast('Flusso creato');render();return}} selected={kind:'item',id};render();}
function onItemDown(e){ if(e.button!==0) return; e.stopPropagation(); const el=e.currentTarget; const i=itemById(el.dataset.id); selected={kind:'item',id:i.id}; const isResize=e.target.dataset.resize; drag={id:i.id,resize:!!isResize,startX:e.clientX,startY:e.clientY,x:i.x,y:i.y,w:i.w,h:i.h}; el.setPointerCapture(e.pointerId); renderEditor();}
document.addEventListener('pointermove',e=>{if(!drag)return; const i=itemById(drag.id); const dx=(e.clientX-drag.startX)/zoom, dy=(e.clientY-drag.startY)/zoom; if(drag.resize){i.w=Math.max(70,drag.w+dx); i.h=Math.max(48,drag.h+dy)}else{i.x=Math.max(0,Math.min(BASE_W-30,drag.x+dx)); i.y=Math.max(0,Math.min(BASE_H-30,drag.y+dy))} markDirty();renderItems();renderFlows();renderEditor();});
document.addEventListener('pointerup',()=>{drag=null});
$('content').addEventListener('click',()=>{if(flowMode&&flowStart){flowStart=null;render()}else{selected=null;render()}})
function toggleFlowMode(){flowMode=!flowMode; flowStart=null; $('flowBtn').classList.toggle('modeOn',flowMode); $('modeText').textContent=flowMode?'Modalità: crea flussi':'Modalità: modifica'; toast(flowMode?'Clicca partenza e destinazione':'Modalità modifica');render()}
function deleteSelected(){ if(!selected)return; if(selected.kind==='item'){const id=selected.id; data.items=data.items.filter(i=>i.id!==id); data.flows=data.flows.filter(f=>f.from!==id&&f.to!==id)} else data.flows=data.flows.filter(f=>f.id!==selected.id); selected=null;markDirty();render()}
function duplicateSelected(){ if(!selected||selected.kind!=='item')return; const i=clone(itemById(selected.id)); i.id='i'+Date.now(); i.x+=30;i.y+=30;i.title+=' copia'; data.items.push(i); selected={kind:'item',id:i.id};markDirty();render()}
function scrollToItem(i){const sc=$('boardScroller'); sc.scrollTo({left:(i.x+i.w/2)*zoom-sc.clientWidth/2,top:(i.y+i.h/2)*zoom-sc.clientHeight/2,behavior:'smooth'})}
function exportJson(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='layout_evento_primo_piano_laboratori.json'; a.click(); URL.revokeObjectURL(url);}
$('jsonInput').addEventListener('change',e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{data=JSON.parse(r.result); selected=null; markDirty(); render(); toast('JSON importato')}catch(err){alert('JSON non valido')}}; r.readAsText(f)})
$('bgInput').addEventListener('change',e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{data.background=r.result;markDirty();render();toast('Planimetria caricata')}; r.readAsDataURL(f)})
function togglePresent(){document.body.classList.toggle('present'); setTimeout(fitToScreen,80)}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#96;')}
window.addEventListener('resize',()=>{if(zoom<.5)fitToScreen()});
render(); setTimeout(fitToScreen,50);
</script>
</body>
